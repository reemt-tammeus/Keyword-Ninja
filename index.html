<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Keyword Ninja</title>
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --success: #4caf50;
            --on-surface: #e0e0e0;
            --on-primary: #000000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--on-surface);
            margin: 0;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        #logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 150px;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(187, 134, 252, 0.4));
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: var(--bg-dark);
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-top: 120px;
            text-align: right;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        #progress-header {
            font-size: 0.9rem;
            color: var(--secondary);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .instruction {
            font-size: 0.8rem;
            color: #999;
            font-style: italic;
            margin: 15px 0;
            line-height: 1.4;
        }

        .task-card {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .original-sentence {
            background: var(--surface);
            padding: 18px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--primary);
            margin-bottom: 25px;
            border-left: 4px solid var(--primary);
        }

        .keyword-box {
            text-align: center;
            margin-bottom: 25px;
        }

        .keyword {
            display: inline-block;
            font-weight: 800;
            font-size: 1.3rem;
            padding: 10px 30px;
            border: 2px dashed var(--secondary);
            border-radius: 10px;
            background: transparent;
            color: var(--on-surface);
        }

        .transformation-area {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            display: block;
            margin: 15px 0;
            padding: 16px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 12px;
            background: #2c2c2c;
            color: white;
            outline: none;
            transition: border-color 0.3s;
            
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus {
            border-color: var(--primary);
        }

        .counter {
            text-align: right;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .footer-controls {
            margin-top: auto;
            padding-bottom: 30px;
        }

        .action-hint {
            text-align: center;
            font-size: 1.1rem;
            color: #bbb;
            font-style: italic;
            margin-top: 10px;
            transition: color 0.3s;
        }

        button {
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.96); }

        .btn-check { background: var(--primary); color: var(--on-primary); }

        .feedback-box {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-weight: 600;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .score-screen {
            text-align: center;
            padding-top: 80px;
            display: none;
        }

        .big-score {
            font-size: 5.5rem;
            font-weight: 900;
            color: var(--primary);
            margin: 20px 0;
            text-shadow: 0 0 25px rgba(187, 134, 252, 0.5);
        }
        
        #loading-screen {
            text-align: center;
            padding-top: 80px;
            color: var(--secondary);
            font-weight: bold;
        }
    </style>
</head>
<body>

<img src="Keyword Ninja.png" id="logo" alt="Ninja Logo">

<div class="app-container">
    <div id="loading-screen">Daten werden geladen...</div>

    <header style="display:none;" id="main-header">
        <div id="progress-header">SET PROGRESS: 1 / 5</div>
    </header>

    <div id="game-ui" class="task-card" style="display:none;">
        <p class="instruction">Transform using 2 to 5 words. Do not change the keyword.</p>
        
        <div class="original-sentence" id="orig">...</div>
        
        <div class="keyword-box">
            <div class="keyword" id="key">...</div>
        </div>

        <div class="transformation-area">
            <span id="prefix"></span>
            
            <input type="text" 
                   id="user-input" 
                   autocomplete="nope" 
                   autocorrect="off" 
                   autocapitalize="none" 
                   spellcheck="false" 
                   data-form-type="other" 
                   data-gramm="false" 
                   data-lpignore="true" 
                   enterkeyhint="done" 
                   placeholder="Your answer...">
                   
            <span id="suffix"></span>
        </div>

        <div class="counter" id="word-count">Words: 0</div>

        <div class="footer-controls">
            <div id="feedback" class="feedback-box"></div>
            <div id="action-hint" class="action-hint">Press Enter to check the answer</div>
        </div>
    </div>

    <div id="score-screen" class="score-screen">
        <h2>Set Score</h2>
        <div class="big-score" id="score-val">0 / 5</div>
        <p style="margin-bottom: 40px; color: #999;">Ready for the next five sentences?</p>
        <button class="btn-check" onclick="resetSet()">YES, NEXT SET!</button>
        <button style="background:#333; margin-top:15px; color:#bbb;" onclick="location.reload()">RESTART ALL</button>
    </div>
</div>

<script>
    let db = []; // Wird nun dynamisch aus der JSON geladen
    let currentSet = [];
    let currentIdx = 0;
    let score = 0;
    let isShowingSolution = false; 

    function normalizeText(text) {
        return text.toLowerCase()
                   .replace(/[\u2018\u2019´`]/g, "'")
                   .replace(/[.!?;]$/, "")
                   .trim();
    }

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function resetSet() {
        currentSet = shuffle([...db]).slice(0, 5);
        currentIdx = 0;
        score = 0;
        document.getElementById('score-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        displayTask();
    }

    function displayTask() {
        const t = currentSet[currentIdx];
        document.getElementById('progress-header').innerText = `SET PROGRESS: ${currentIdx + 1} / 5`;
        document.getElementById('orig').innerText = t.orig;
        document.getElementById('key').innerText = t.key;
        document.getElementById('prefix').innerText = t.pre;
        document.getElementById('suffix').innerText = t.suf;
        
        const inp = document.getElementById('user-input');
        inp.value = "";
        inp.disabled = false;
        
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('action-hint').innerText = 'Press Enter to check the answer';
        document.getElementById('action-hint').style.color = '#bbb';
        
        isShowingSolution = false;
        updateWordCount();
        
        setTimeout(() => inp.focus(), 50);
    }

    function updateWordCount() {
        const val = document.getElementById('user-input').value.trim();
        const count = val === "" ? 0 : val.split(/\s+/).length;
        const cEl = document.getElementById('word-count');
        cEl.innerText = `Words: ${count}`;
        cEl.style.color = (count >= 2 && count <= 5) ? "var(--secondary)" : "var(--error)";
    }

    document.getElementById('user-input').addEventListener('input', updateWordCount);

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && document.getElementById('game-ui').style.display !== 'none') {
            if (!isShowingSolution) {
                checkAnswer();
            } else {
                nextTask();
            }
        }
    });

    function checkAnswer() {
        const t = currentSet[currentIdx];
        const inp = document.getElementById('user-input');
        const rawVal = inp.value.trim();
        const words = rawVal.split(/\s+/).filter(w => w !== "");
        
        const valNorm = normalizeText(rawVal);
        const keyNorm = normalizeText(t.key);
        
        if (!valNorm.includes(keyNorm)) {
            showFeedback(`Keyword "${t.key}" missing!`, "var(--error)");
            return;
        }
        if (words.length < 2 || words.length > 5) {
            showFeedback(`Word count error: ${words.length}`, "var(--error)");
            return;
        }

        const isCorrect = t.ideal.some(s => normalizeText(s) === valNorm);
        
        if (isCorrect) {
            score++;
            showFeedback("✅ Correct!", "var(--success)");
        } else {
            showFeedback(`❌ Wrong. Solution: ${t.ideal[0]}`, "#999");
        }

        inp.disabled = true;
        inp.blur(); 
        
        document.getElementById('action-hint').innerText = 'Press Enter to continue';
        document.getElementById('action-hint').style.color = 'var(--secondary)';
        
        setTimeout(() => { isShowingSolution = true; }, 100);
    }

    function showFeedback(msg, color) {
        const fb = document.getElementById('feedback');
        fb.innerText = msg;
        fb.style.display = 'block';
        fb.style.backgroundColor = color === "var(--success)" ? "rgba(76, 175, 80, 0.1)" : "rgba(207, 102, 121, 0.1)";
        fb.style.color = color;
    }

    function nextTask() {
        currentIdx++;
        if (currentIdx < 5) {
            displayTask();
        } else {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('score-screen').style.display = 'block';
            document.getElementById('score-val').innerText = `${score} / 5`;
        }
    }

    // App Initialisierung: Daten aus data.json laden
    async function initApp() {
        try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error('Netzwerk-Antwort war nicht ok');
            db = await response.json();
            
            // Ladebildschirm ausblenden, Spiel anzeigen
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'block';
            
            resetSet();
        } catch (error) {
            console.error('Fehler beim Laden der Daten:', error);
            document.getElementById('loading-screen').innerHTML = '<span style="color:var(--error);">Fehler beim Laden der Sätze. Bitte lade die Seite neu.</span>';
        }
    }

    // Start
    initApp();
</script>
</body>
</html>
